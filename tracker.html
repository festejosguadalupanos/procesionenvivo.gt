<!DOCTYPE html>
<html>
<head>
  <title>Tracker Manual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .titulo {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #0d1b2a;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      z-index: 1000;
    }

    .btn {
      position: absolute;
      left: 10px;
      background: #111;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      z-index: 1000;
    }

    .btn:hover {
      background: #333;
    }

    .deshacer { top: 60px; }
    .iniciar { top: 100px; background: green; }
    .finalizar { top: 140px; background: red; }
  </style>
</head>

<body>

<div class="titulo">Toca el mapa para enviar ubicación 📍</div>

<button class="btn deshacer" onclick="deshacer()">↩️ Deshacer</button>
<button class="btn iniciar" onclick="iniciar()">▶️ Iniciar</button>
<button class="btn finalizar" onclick="finalizar()">⛔ Finalizar</button>

<div id="map"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBqCCRgl-T4iVxOkFr54t-V5TsLEtUePUw",
  authDomain: "procesion2026.firebaseapp.com",
  databaseURL: "https://procesion2026-default-rtdb.firebaseio.com",
  projectId: "procesion2026",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Crear mapa
const map = L.map('map').setView([14.6349, -90.5069], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// Variables
let marker;
let recorrido = [];
let lineaRecorrida;

// CLICK EN MAPA
map.on('click', function(e) {

  const lat = e.latlng.lat;
  const lng = e.latlng.lng;
  const punto = [lat, lng];

  // Guardar punto
  recorrido.push(punto);

  // Guardar en Firebase
  db.ref("recorrido").set(recorrido);

  // Marcador
  if (marker) {
    marker.setLatLng(punto);
  } else {
    marker = L.marker(punto).addTo(map);
  }

  // Dibujar recorrido
  if (lineaRecorrida) {
    map.removeLayer(lineaRecorrida);
  }

  lineaRecorrida = L.polyline(recorrido, {
    color: 'black',
    weight: 6,
    opacity: 0.9
  }).addTo(map);

  // Ubicación actual
  db.ref("ubicacion").set({ lat, lng });

});

// 🔁 DESHACER
function deshacer() {

  if (recorrido.length > 0) {

    recorrido.pop();

    db.ref("recorrido").set(recorrido);

    if (lineaRecorrida) {
      map.removeLayer(lineaRecorrida);
    }

    lineaRecorrida = L.polyline(recorrido, {
      color: 'black',
      weight: 6,
      opacity: 0.9
    }).addTo(map);

    if (recorrido.length > 0) {
      marker.setLatLng(recorrido[recorrido.length - 1]);
    }

  } else {
    alert("No hay puntos para borrar");
  }
}

// ▶️ INICIAR
function iniciar() {
  db.ref("estado").set("activo");
  alert("Procesión iniciada");
}

// ⛔ FINALIZAR
function finalizar() {
  db.ref("estado").set("inactivo");
  alert("Procesión finalizada");
}

</script>

</body>
</html>
